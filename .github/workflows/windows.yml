name: Windows MSVC Headers

on:
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

# The MinGW build that previously lived here duplicated `ci.yml::ci-windows`
# (same OS, same setup-msys2, same `make ci`). Removed in #244 to drop a
# 2x-billing-multiplier job from every PR. The MSVC header check stays
# because MSVC parses our headers differently than MinGW GCC and has
# caught real portability bugs.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # MSVC compatibility check — ensure headers compile under cl.exe
  # No full build yet (runtime needs Win32 threading wiring), but
  # we verify that all public headers pass the MSVC parser.
  # ============================================================
  headers-msvc:
    name: Header compatibility (MSVC)
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Visual Studio developer environment
      uses: ilammy/msvc-dev-cmd@v1

    - name: Check portable headers compile under cl.exe
      shell: cmd
      run: |
        :: Compile each portable header as a standalone translation unit.
        :: This catches any GCC-isms that slipped through the guards.
        :: Note: cl.exe cannot open 'nul' as a source file — use a real empty file.
        echo. > _probe.c

        cl /nologo /W3 /std:c11 /Zc:preprocessor ^
           /I runtime /I runtime/utils /I runtime/actors ^
           /I runtime/scheduler /I runtime/memory /I runtime/config ^
           /FI runtime/utils/aether_compiler.h /c _probe.c ^
           && echo "aether_compiler.h OK" || exit 1

        cl /nologo /W3 /std:c11 /Zc:preprocessor ^
           /I runtime /I runtime/utils /I runtime/actors ^
           /I runtime/scheduler /I runtime/memory /I runtime/config ^
           /FI runtime/utils/aether_thread.h /c _probe.c ^
           && echo "aether_thread.h OK" || exit 1

        del _probe.c _probe.obj 2>nul
