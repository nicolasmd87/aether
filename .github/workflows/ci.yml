name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup GCC (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make
        
    - name: Setup GCC (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install gcc make
        
    - name: Setup GCC (Windows)
      if: matrix.os == 'windows-latest'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          make
          
    - name: Build Compiler (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        make
        ls -la build/
        
    - name: Build Compiler (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: |
        make
        ls -la build/
        
    - name: Run Tests (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        make test
        
    - name: Run Tests (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: |
        make test
        
    - name: Upload Compiler Artifact
      uses: actions/upload-artifact@v3
      with:
        name: aetherc-${{ matrix.os }}
        path: |
          build/aetherc*
          
  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup GCC and coverage tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make gcovr lcov
        
    - name: Build with coverage
      run: |
        make CFLAGS="-O0 -g --coverage" test
        
    - name: Generate coverage report
      run: |
        gcovr -r . --html --html-details -o coverage.html
        gcovr -r . --xml -o coverage.xml
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: coverage.xml
        fail_ci_if_error: false
        
    - name: Upload coverage HTML
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: coverage.html
  
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Install cppcheck
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck
        
    - name: Run cppcheck
      run: |
        cppcheck --enable=warning,performance,portability --error-exitcode=0 \
          --suppress=missingIncludeSystem --inline-suppr \
          -I compiler -I runtime compiler/ runtime/ 2> cppcheck-report.txt
        cat cppcheck-report.txt
        
    - name: Upload analysis results
      uses: actions/upload-artifact@v3
      with:
        name: static-analysis
        path: cppcheck-report.txt
  
  verify-examples:
    name: Verify Examples Compile
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup GCC
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make
        
    - name: Build compiler
      run: make
      
    - name: Compile all examples
      run: |
        set -e
        for example in examples/basic/*.ae examples/tests/*.ae; do
          if [ -f "$example" ]; then
            echo "Testing $example"
            outfile="${example%.ae}.c"
            ./build/aetherc "$example" "$outfile"
            gcc "$outfile" -Iruntime runtime/*.c -o "${example%.ae}.exe" -lpthread
            rm -f "$outfile" "${example%.ae}.exe"
          fi
        done
        
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Check file formatting
      run: |
        # Check for trailing whitespace
        ! grep -r '[[:blank:]]$' --include='*.c' --include='*.h' compiler/ runtime/ || echo "Found trailing whitespace"
        
    - name: Check for TODO/FIXME comments
      run: |
        echo "Checking for TODO/FIXME comments..."
        grep -rn "TODO\|FIXME" --include='*.c' --include='*.h' compiler/ runtime/ || echo "No TODOs found"

