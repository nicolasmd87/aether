<!DOCTYPE html>
<html>
<head>
    <title>Debug - Benchmark Results</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        h1 { color: #333; }
        pre { background: #fff; padding: 15px; border: 1px solid #ddd; overflow: auto; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Benchmark Results Debug Page</h1>
    <div id="status">Loading...</div>
    <h2>Ping-Pong Results:</h2>
    <pre id="data"></pre>
    
    <script>
        async function load() {
            const status = document.getElementById('status');
            const data = document.getElementById('data');
            
            try {
                status.innerHTML = 'Fetching /results_ping_pong.json...';
                const response = await fetch('/results_ping_pong.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const json = await response.json();
                status.innerHTML = '<span class="success">✓ Data loaded successfully!</span>';
                data.textContent = JSON.stringify(json, null, 2);
                
                // Show quick summary
                const langs = Object.keys(json.benchmarks || {});
                status.innerHTML += `<br><br>Found ${langs.length} languages: ${langs.join(', ')}`;
                
            } catch (e) {
                status.innerHTML = `<span class="error">✗ Error: ${e.message}</span>`;
                data.textContent = e.stack;
            }
        }
        
        load();
    </script>
</body>
</html>
